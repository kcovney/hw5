<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Problem 1</title>
</head>

<body>
    <script>
        const firstName = prompt("enter your first name:");
        const lastName = prompt("enter your last name:");
        alert(`Your name is ${firstName} ${lastName}`);
        let valid = false;
        while (!valid) {
            const num_children = prompt("how many children do you have?");
            if (!Number.isInteger(Number(num_children)) || num_children < 0) {
                alert("invalid number of children");
                continue;
            }
            valid = true;
            const children = document.createElement("p");
            children.textContent = num_children;
            document.body.appendChild(children);
            if (num_children == 0) {
                children.innerHTML = "You have no children";
            }
            else if (num_children == 1) {
                children.innerHTML = "You have 1 child";
            }
            else if (num_children > 0) {
                children.innerText = "You have " + num_children + " children";
            }
        }
    </script>
</body>

</html>
