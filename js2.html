<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Problem 2</title>
</head>

<body>
    <script>
        let num1, num2;
        while (true) {
            num1 = prompt("enter a number");
            num2 = prompt("enter another number");
            if (!isNaN(num1) && !isNaN(num2)) {
                break;
            }
            alert("please enter a valid number");
        }
        const result = Number(num1) <= Number(num2) ? num1 + " " + num2 : num2 + " " + num1;  
        console.log(result);
    </script>
</body>

</html>
